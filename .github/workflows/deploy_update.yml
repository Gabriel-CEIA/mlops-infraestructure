name: Update and Deploy Infrastructure

on:
  workflow_dispatch

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  S3_TERRAFORM_BACKEND_BUCKET: ${{ secrets.S3_TERRAFORM_BACKEND_BUCKET }}
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.14.5

      - name: Initialize Terraform
        run: terraform init -backend-config="bucket=${{ env.S3_TERRAFORM_BACKEND_BUCKET }}"

      - name: Retrieve all .tfvars from S3
        run: aws s3 cp s3://$S3_TERRAFORM_BACKEND_BUCKET/ . --recursive --exclude "*" --include "*.tfvars"

      - name: Plan Terraform
        run: terraform plan -var="image=true" -out=tfplan

      - name: Apply Terraform
        run: terraform apply -auto-approve tfplan
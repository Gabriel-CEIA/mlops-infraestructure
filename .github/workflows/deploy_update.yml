name: 02-Update and Deploy Infrastructure

on:
  workflow_dispatch

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_TERRAFORM_BACKEND_BUCKET: ${{ secrets.S3_TERRAFORM_BACKEND_BUCKET }}
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/mlops-github-actions-role

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.14.5

      - name: Initialize Terraform
        run: terraform init -backend-config="bucket=${{ env.S3_TERRAFORM_BACKEND_BUCKET }}"

      - name: Retrieve all .tfvars from S3
        run: aws s3 cp s3://$S3_TERRAFORM_BACKEND_BUCKET/ . --recursive --exclude "*" --include "*.tfvars"

      - name: Plan Terraform
        run: terraform plan -var="image=true" -out=tfplan

      - name: Apply Terraform
        run: terraform apply -auto-approve tfplan